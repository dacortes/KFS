name: KFS CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "feature/*", "fix/*" ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            nasm \
            lcov \
            cppcheck \
            libgtest-dev \
            cmake

      - name: Code Style Check (checkpatch)
        run: |
          chmod +x ./scripts/style_check.sh
          ./scripts/style_check.sh

      - name: Static Analysis (cppcheck)
        run: |
          chmod +x ./scripts/static_analysis.sh
          ./scripts/static_analysis.sh

      - name: Build Project
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Generate Code Coverage
        run: |
          if [ -f ./scripts/coverage.sh ]; then
            echo "Generating code coverage report..."
            chmod +x ./scripts/coverage.sh
            ./scripts/coverage.sh
            echo "Coverage report generated"
          else
            echo "scripts/coverage.sh not found, skipping coverage generation"
            exit 1
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/
          retention-days: 30

      - name: Comment PR with Coverage
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "Repo Owner: ${{ github.repository_owner }}"
          echo "Repo Name: ${{ github.event.repository.name }}"
          chmod +x ./scripts/comment_pr_coverage.sh
          ./scripts/comment_pr_coverage.sh "${{ github.event.pull_request.number }}" "${{ github.repository_owner }}" "${{ github.event.repository.name }}" || echo "Failed to post PR comment, but continuing..."

  build-summary:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    name: Build Summary
    
    steps:
      - name: Build Status
        run: |
          echo "=== KFS Build Pipeline Summary ==="
          echo "Build timestamp: $(date)"
          echo "Build and Test job status: ${{ needs.build-and-test.result }}"
          echo ""
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "✅ All checks passed successfully!"
            exit 0
          else
            echo "❌ Build failed. Check the logs above for details."
            exit 1
          fi
