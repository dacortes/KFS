name: KFS CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "feature/*", "fix/*" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            nasm \
            lcov \
            cppcheck \
            libgtest-dev \
            cmake

      - name: Code Style Check (checkpatch)
        continue-on-error: true
        run: |
          if [ -f ./scripts/checkpatch.pl ]; then
            echo "Running checkpatch.pl on C files..."
            for file in $(find src -name "*.c" 2>/dev/null); do
              echo "Checking: $file"
              ./scripts/checkpatch.pl --no-tree --file "$file" || true
            done
            echo "Checkpatch validation complete"
          else
            echo "checkpatch.pl not found, skipping"
          fi

      - name: Static Analysis (cppcheck)
        continue-on-error: true
        run: |
          if [ -d src ]; then
            echo "Running cppcheck..."
            cppcheck --enable=all --error-exitcode=0 src/ || true
          fi

      - name: Build Project
        run: |
          echo "Building KFS project..."
          make clean
          make -j$(nproc)
          echo "Build completed successfully"

      - name: Generate Code Coverage
        continue-on-error: true
        run: |
          if [ -f ./coverage.sh ]; then
            echo "Generating code coverage report..."
            chmod +x ./coverage.sh
            ./coverage.sh
            echo "Coverage report generated"
          else
            echo "coverage.sh not found, skipping coverage generation"
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage_report/
          retention-days: 30

      - name: Comment PR with Coverage
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            try {
              const coverage = fs.readFileSync('coverage_report/coverage.info', 'utf8');
              if (coverage) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '✅ Code coverage report generated. Check artifacts for details.'
                });
              }
            } catch (e) {
              console.log('Coverage report not available for comment');
            }

  build-summary:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    name: Build Summary
    
    steps:
      - name: Build Status
        run: |
          echo "=== KFS Build Pipeline Summary ==="
          echo "Build timestamp: $(date)"
          echo "Workflow status: ${{ job.status }}"
          echo ""
          echo "Jobs completed:"
          echo "  ✓ Build and Test"
          echo "  ✓ Code Quality"
          echo "  ✓ Guidelines Verification"
